{% extends "base.html" %}
{% block title %}Sign Out — Transfer Market{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 53px);">
  <div class="card" style="max-width:360px;width:100%;text-align:center;">
    <div style="font-size:2rem;margin-bottom:12px;">👋</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;margin-bottom:8px;">Sign out?</div>
    <div style="color:var(--text-dim);font-size:0.88rem;margin-bottom:20px;">You'll need to sign back in to access your competitions.</div>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-gold" style="width:100%;padding:12px;">Sign Out</button>
    </form>
    <a href="/" style="display:block;margin-top:12px;color:var(--text-dim);font-size:0.85rem;">← Go back</a>
  </div>
</div>
{% endblock %}
