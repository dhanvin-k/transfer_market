{% extends "base.html" %}
{% block title %}Join Competition — Transfer Market{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 53px);padding:40px 24px;">
  <div class="card" style="max-width:380px;width:100%;">
    <a href="/" style="color:var(--text-dim);font-size:0.85rem;">← Back</a>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;margin:12px 0 4px;">Join Competition</div>
    <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:20px;">Enter the invite code your friend shared.</div>
    <form method="post">
      {% csrf_token %}
      <label style="display:block;font-size:0.78rem;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.08em;text-transform:uppercase;">Invite Code</label>
      <input type="text" name="code" placeholder="TM-XXXX" maxlength="12" autofocus style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;padding:12px 16px;outline:none;letter-spacing:0.1em;text-transform:uppercase;text-align:center;margin-bottom:14px;">
      <button type="submit" class="btn btn-gold" style="width:100%;padding:12px;font-size:1.05rem;">Join →</button>
    </form>
  </div>
</div>
{% endblock %}
